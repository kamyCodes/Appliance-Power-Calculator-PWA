<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient for Full Fill -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    
    <!-- Neon Stroke Gradient -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#8a2be2" />
    </linearGradient>

    <!-- Bolt Glow Effect -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Solid Background for full fill (required for maskable) -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Padded Inner Container (Safe zone is within the center 60% of the box) -->
  <g transform="translate(51, 51) scale(0.8)">
    <!-- Outer Glowing Circle -->
    <circle cx="256" cy="256" r="170" fill="none" stroke="url(#neonGrad)" stroke-width="12" filter="url(#neonGlow)" stroke-dasharray="8 8" opacity="0.6" />
    <circle cx="256" cy="256" r="140" fill="none" stroke="url(#neonGrad)" stroke-width="6" opacity="0.8" />

    <!-- Lightning Bolt Symbol -->
    <path d="M280 60 L150 260 H250 L200 452 L360 220 H260 Z" 
          fill="url(#neonGrad)" 
          filter="url(#neonGlow)" />
  </g>
</svg>
